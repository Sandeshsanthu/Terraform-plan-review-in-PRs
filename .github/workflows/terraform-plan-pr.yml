# Code Generated by Sidekick is for learning and experimentation purposes only.
name: terraform-plan-pr

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "terraform-plan-review-in-PRs/**"
      - ".github/workflows/terraform-plan-pr.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: Terraform fmt (check)
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: infra
        run: |
          # Code Generated by Sidekick is for learning and experimentation purposes only.
          set -euo pipefail
          terraform plan -no-color -input=false -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            infra/plan.txt
            infra/tfplan
          if-no-files-found: error
          retention-days: 7

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            // Code Generated by Sidekick is for learning and experimentation purposes only.
            const fs = require('fs');

            const plan = fs.readFileSync('infra/plan.txt', 'utf8');

            // Keep comments from getting too large
            const max = 60000;
            const bodyPlan = plan.length > max
              ? plan.slice(0, max) + "\n\n... (truncated) — see workflow artifact `terraform-plan` for full output."
              : plan;

            const marker = '<!-- terraform-plan-bot -->';
            const body =
              `${marker}\n` +
              `## Terraform plan (PR #${context.issue.number})\n` +
              `\n<details><summary>Show plan</summary>\n\n` +
              `\`\`\`\n${bodyPlan}\n\`\`\`\n` +
              `</details>\n`;

            // Replace previous bot comment if present; else create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const previous = comments.find(c => c.body && c.body.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
